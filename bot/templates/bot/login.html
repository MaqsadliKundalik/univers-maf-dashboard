<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - MafiaDash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #17212b;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: #232e3c;
            border: 1px solid #1c2733;
            border-radius: 18px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo .icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #2b5278, #5288c1);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-size: 1.4rem; font-weight: 700; color: #f5f5f5;
        }
        .login-logo p {
            font-size: 0.85rem; color: #708499; margin-top: 4px;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.82rem; font-weight: 600;
            color: #adb5bd;
            margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .form-input {
            width: 100%;
            background: #1c2631;
            border: 1px solid #2b3a4a;
            border-radius: 10px;
            color: #f5f5f5;
            padding: 12px 14px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color .2s;
        }
        .form-input:focus { border-color: #5288c1; }
        .form-input::placeholder { color: #708499; }
        .btn-login {
            width: 100%;
            background: #2b5278;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #3a6a9a; }
        .error-msg {
            background: #3d1212;
            color: #f44336;
            border: 1px solid #6a2020;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }
        .input-wrap { position: relative; }
        .input-wrap .toggle-pass {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: #708499; cursor: pointer; font-size: 1.1rem;
            padding: 0;
        }
        .input-wrap .toggle-pass:hover { color: #adb5bd; }
        .input-wrap input { padding-right: 40px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-logo">
        <div class="icon"><i class="bi bi-joystick"></i></div>
        <h1>MafiaDash</h1>
        <p>Bot boshqaruv paneli</p>
    </div>

    {% if form.errors %}
    <div class="error-msg">
        <i class="bi bi-x-circle me-2"></i>Login yoki parol noto'g'ri.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Foydalanuvchi nomi</label>
            <input type="text" name="username" class="form-input" placeholder="Username" autofocus autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Parol</label>
            <div class="input-wrap">
                <input type="password" name="password" id="passInput" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
                <button type="button" class="toggle-pass" onclick="togglePass()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Kirish
        </button>
    </form>
</div>
<script>
function togglePass() {
    const inp = document.getElementById('passInput');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
