<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodyMafia Owner Login</title>
    <style>
        :root {
            --page-top:#fff7f8;
            --page-mid:#210208;
            --page-bottom:#040405;
            --paper:#fff;
            --ink:#101014;
            --muted:#6c6670;
            --line:rgba(128,0,20,.16);
            --blood:#7f0015;
            --blood-2:#d20a22;
            --shadow:0 28px 80px rgba(64,0,12,.18), 0 10px 28px rgba(64,0,12,.1);
        }
        * { box-sizing:border-box; }
        body {
            margin:0;
            min-height:100vh;
            display:grid;
            place-items:center;
            padding:24px;
            color:var(--ink);
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:
                radial-gradient(circle at 12% 9%, rgba(255,49,80,.22), transparent 20rem),
                radial-gradient(circle at 88% 18%, rgba(127,0,21,.18), transparent 22rem),
                linear-gradient(180deg, var(--page-top) 0%, #fff 34%, #f9eef1 52%, var(--page-mid) 78%, var(--page-bottom) 100%);
        }
        .login-card {
            width:min(100%, 430px);
            background:rgba(255,255,255,.96);
            border:1px solid var(--line);
            border-radius:24px;
            box-shadow:var(--shadow);
            padding:28px;
            position:relative;
            overflow:hidden;
        }
        .login-card::after {
            content:"";
            position:absolute;
            left:0;
            right:0;
            bottom:0;
            height:5px;
            background:linear-gradient(90deg, var(--blood), #ff3150, var(--blood));
        }
        .eyebrow { color:var(--blood-2); font-size:.76rem; font-weight:900; text-transform:uppercase; letter-spacing:.14em; margin-bottom:10px; }
        h1 { margin:0 0 8px; font-size:2rem; line-height:1.05; }
        p { margin:0 0 22px; color:var(--muted); }
        label { display:block; font-size:.8rem; font-weight:800; color:#3b3339; margin:14px 0 7px; }
        input {
            width:100%;
            border:1px solid rgba(127,0,21,.16);
            border-radius:14px;
            padding:13px 14px;
            font:inherit;
            outline:none;
            background:#fff;
        }
        input:focus { border-color:rgba(210,10,34,.52); box-shadow:0 0 0 4px rgba(210,10,34,.08); }
        button {
            width:100%;
            margin-top:18px;
            border:0;
            border-radius:999px;
            padding:13px 16px;
            color:#fff;
            background:linear-gradient(135deg,var(--blood),var(--blood-2));
            font-weight:900;
            cursor:pointer;
        }
        .error {
            margin-top:14px;
            border:1px solid rgba(210,10,34,.2);
            background:rgba(210,10,34,.08);
            color:var(--blood);
            border-radius:14px;
            padding:10px 12px;
            font-size:.86rem;
            font-weight:800;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="eyebrow">BloodyMafia Dashboard</div>
        <h1>Guruh egasi kirishi</h1>
        <p>Login-parol orqali guruh boshqaruviga kiring.</p>
        <form method="post">
            {% csrf_token %}
            <label for="login">Login</label>
            <input id="login" name="login" autocomplete="username" required>
            <label for="password">Parol</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Kirish</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </main>
</body>
</html>
